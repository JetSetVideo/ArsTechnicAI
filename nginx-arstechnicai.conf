# ============================================================
# ArsTechnicAI — Nginx production config
# Replace YOUR_DOMAIN with your actual domain or DDNS hostname
# e.g.  arstechnicai.ddns.net  or  arstechnicai.yourdomain.com
# ============================================================

# Redirect all HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # --- SSL certificates (managed by certbot) ---
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           SAMEORIGIN                                      always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"      always;

    # --- Upload size (matches MAX_FILE_SIZE_MB) ---
    client_max_body_size 500M;

    # --- Gzip compression ---
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary       on;

    # --- Rate limiting zone (define once in http block or here for simplicity) ---
    # If you put this in /etc/nginx/nginx.conf http{} block use:
    #   limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    # and uncomment the limit_req lines below.

    # ── Next.js app (proxy) ────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;

        # WebSocket support (Next.js HMR + future WS features)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Uncomment after adding limit_req_zone to nginx.conf:
        # limit_req zone=api burst=20 nodelay;
    }

    # ── API rate limiting (stricter) ───────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Uncomment after adding limit_req_zone to nginx.conf:
        # limit_req zone=api burst=10 nodelay;
    }

    # ── Static storage files (served directly, cached) ────
    location /storage/ {
        alias   /home/jetsetvideo/ArsTechnicAI/storage/;
        expires 1h;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff always;

        # Block directory listing
        autoindex off;
    }

    # ── Health check (no rate limiting needed) ────────────
    location /api/health {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Block common attack paths ──────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
    }
}
